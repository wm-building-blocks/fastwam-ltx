# @package _global_

defaults:
  - _self_
  - data: null
  - model: null
  - task: null


output_dir: ./runs/train/${now:%Y-%m-%d}_${now:%H-%M-%S}

# dataloading
batch_size: 2
num_workers: 16
# Batches each dataloader worker pre-fetches ahead of demand. Higher = deeper
# queue, smoother per-step time when video decode (multi-camera .mp4) is jittery.
# 16/6 measured: steady step-time median 10s -> 7s vs the old 4/4 default.
prefetch_factor: 6

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1.0e-4
num_epochs: 1
max_steps: null
log_every: 10
save_every: 100
# Checkpoint rotation. state (~214GB for A14B) is only useful for resume,
# so keep just the latest. weights (~31GB) accumulate one rolling slot plus
# one anchor every long_term_save_every steps for long-term keeping.
state_keep_last_n: 1
weights_keep_last_n: 1
long_term_save_every: 10000
eval_every: 50
eval_num_inference_steps: 10

# training
gradient_accumulation_steps: 1
mixed_precision: "bf16" # one of: [no, fp16, bf16]
seed: 42
max_grad_norm: 1.0
weight_decay: 0.0
resume: null
# torch.compile the MoT transformer blocks (block-level, FSDP-compatible).
# Off by default — verify with a GPU smoke run before enabling for a long run.
compile_mot: false
# Optimizer: "adamw" or "adamw8bit". 8-bit (bitsandbytes) halves optimizer-state
# VRAM; effective under FSDP / ZeRO-1 / DDP. No-op under DeepSpeed ZeRO-2 offload.
optimizer_type: "adamw"

# wandb
wandb:
  enabled: false
  workspace: null
  project: fastwam_ltx
  name: train
  group: null
  mode: online

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
