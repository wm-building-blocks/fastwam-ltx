# @package _global_

defaults:
  - override /data: robotwin
  - override /model: fastwam
  - _self_

# dataloading — A14B 14B + Wan2.1-VAE x4 tokens needs smaller batch
batch_size: 2
num_workers: 8

model:
  mot_checkpoint_mixed_attn: true
  # stride=2 → only half of the 40 MoT layers checkpoint; rest store activations.
  # ~2× activation memory of stride=1; if OOM, drop back to 1.
  mot_checkpoint_stride: 2

# scheduler
# Match FastWAM-5B's 30k-step recipe: 30k optimizer steps over 27,500
# RoboTwin2.0 demos at effective batch 2*8*7=112 ≈ 122 epochs of data.
# (5B was 30k @ effective batch 128 ≈ 140 epochs; same order of magnitude.)
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 1000          # large cap; max_steps below is the real limit
max_steps: 30000
log_every: 10
save_every: 2500
eval_every: 500

# training — per-GPU micro batch=2, grad_accum=8, 7 GPUs => effective batch 112
gradient_accumulation_steps: 8
weight_decay: 1e-2
resume: null
