# @package _global_

defaults:
  - override /data: robotwin
  - override /model: fastwam_idm
  - _self_

# dataloading — A14B 14B + Wan2.1-VAE x4 tokens needs smaller batch
batch_size: 2
num_workers: 8

model:
  mot_checkpoint_mixed_attn: true

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

# training — effective batch = 2 x 8 = 16
gradient_accumulation_steps: 8
weight_decay: 1e-2
resume: null
