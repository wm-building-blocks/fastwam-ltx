_target_: fastwam.runtime.create_fastwam
# --- LTX-2.3 checkpoint paths -------------------------------------------------
ckpt_path: checkpoints/Lightricks/LTX-2.3/ltx-2.3-22b-dev.safetensors
gemma_path: checkpoints/google/gemma-3-12b-it
# Training reads precomputed text embeddings from disk; Gemma stays unloaded.
load_text_encoder: false
attach_gemma_to_text_encoder: false
proprio_dim: ${data.train.processor.proprio_output_dim}
# FSDP wraps each MoTBlock with external CheckpointWrapper; internal ckpt would double-up and OOM.
mot_checkpoint_mixed_attn: false
action_dit_pretrained_path: null   # ActionDiT trains from random init (no alpha-scale yet).
skip_dit_load_from_pretrain: false

# Video DiT: thin config consumed by LTXVideoDiT's loader; the heavy config is
# parsed from the safetensors metadata at load time. We only carry the
# FastWAM-side knobs that don't belong in the upstream LTX config.
video_dit_config:
  text_dim: 4096                      # LTX cross-attn inner dim (fixed)
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}
  action_dim: ${data.train.processor.action_output_dim}

# ActionDiT (LTX-isomorphic, hidden=1024, ~3.2B params at 48 layers).
action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  num_heads: 32                       # 32 * 128 = 4096 inner_dim (matches LTX video block).
  attn_head_dim: 128
  num_layers: 48                      # Must match LTX video DiT num_layers.
  text_dim: 4096
  eps: 1.0e-06
  cross_attention_adaln: false        # action hidden 1024 ≠ context 4096, plain cross-attn.
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

# LTX2Scheduler shifts (placeholder; replace with token-count-dependent ones in Task 14).
video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000
  sigma_floor: 0.0

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000
  sigma_floor: 0.0

loss:
  lambda_video: 1.0
  lambda_action: 1.0
